<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATS Friendly Resume</title>
    <style>
        body { font-family: 'Arial', sans-serif; line-height: 1.6; color: #333; }
        .resume-section { margin-bottom: 20px; }
        h1, h2 { color: #0f172a; border-bottom: 1px solid #ccc; }
    </style>
</head>
<body>
    <header class="resume-section">
        <h1>John Doe</h1>
        <p>Software Engineer | email@example.com | 123-456-7890</p>
    </header>

    <section class="resume-section" id="experience">
        <h2>Professional Experience</h2>
        <h3>Senior Developer - Tech Corp</h3>
        <p>2023 - Present</p>
        <ul>
            <li>Developed scalable web applications using JavaScript and Python.</li>
            <li>Improved database query speeds by 40%.</li>
        </ul>
    </section>
</body>
</html>
